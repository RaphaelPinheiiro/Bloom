<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/dist/css/index.css" />
  <link rel="icon" href="/src/favicon.png" type="image/png" />
  <title>Bloom</title>
</head>

<body class="js-body">
  <div class="l-container">
    <header class="l-header wrapper d-grid padding">
      <img class="l-header__logo" src="/src/image/id/ID Bloom-05.png" alt="Bloom" />
      <a class="c-arrow" href="/index.html#photograph">&blacktriangleleft;</a>
    </header>
    <main class="l-main js-main wrapper">
      <section id="inicio" class="l-main__intro bg-gallery1 tp-cream">
        <div class="align-center padding">
          <h1 class="l-main__title fs-800">
            Ingrid<span class="d-block">&</span>Diego
          </h1>
          <p class="l-main__paragraph">
            Quando estou fotografando, gosto de imaginar que estamos dentro de um filme, no qual cada cena possui uma
            conexão com a outra. Objetos, detalhes e ambientes onde a história está sendo contada interferem diretamente
            no tipo de mensagem que queremos transmitir.
          </p>
          <a class="c-arrow" href="/pages/01.html#photograph">&blacktriangledown;</a>
        </div>
      </section>
      <section id="photograph" class="l-main__photograph">
        <div class="l-main__gallery">
          <picture class="l-main__image vertical">
            <source srcset="/src/image/editorial/serras_altas/01.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/01.jpg" alt="Ingrid and Diego" />
          </picture>
          <picture class="l-main__image horizontal">
            <source srcset="/src/image/editorial/serras_altas/02.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/02.jpg" alt="Ingrid and Diego" />
          </picture>
          <picture class="l-main__image horizontal">
            <source srcset="/src/image/editorial/serras_altas/03.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/03.jpg" alt="Ingrid and Diego" />
          </picture>
          <picture class="l-main__image horizontal">
            <source srcset="/src/image/editorial/serras_altas/04.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/04.jpg" alt="Ingrid and Diego" />
          </picture>
          <picture class="l-main__image horizontal">
            <source srcset="/src/image/editorial/serras_altas/05.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/05.jpg" alt="Ingrid and Diego" />
          </picture>
          <picture class="l-main__image horizontal">
            <source srcset="/src/image/editorial/serras_altas/06.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/06.jpg" alt="Ingrid and Diego" />
          </picture>
          <picture class="l-main__image horizontal">
            <source srcset="/src/image/editorial/serras_altas/07.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/07.jpg" alt="Ingrid and Diego" />
          </picture>
          <picture class="l-main__image vertical">
            <source srcset="/src/image/editorial/serras_altas/08.webp" type="image/webp" />
            <img class="l-main__background" src="/src/image/editorial/serras_altas/08.jpg" alt="Ingrid and Diego" />
          </picture>
        </div>
      </section>
    </main>
    <footer class="l-footer wrapper">&copy;Bloom</footer>
  </div>
</body>

</html>
